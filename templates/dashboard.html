{% extends "base.html" %}

{% block content %}

<h2>Welcome {{user}}</h2>

<h4 class="mt-4">Upload File to Vault</h4>

<form action="/upload" method="POST" enctype="multipart/form-data">

<div class="mb-3">

<input type="file" name="file" class="form-control">

</div>

<button class="btn btn-primary">

Upload Securely

</button>

</form>


<hr>

<h4>Your Vault Files</h4>

<table class="table table-dark">

<tr>

<th>File Name</th>
<th>Download</th>

</tr>

{% for file in files %}

<tr>

<td>{{file}}</td>

<td>

<a href="/download/{{file}}" class="btn btn-success btn-sm">

Download

</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
